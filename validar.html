<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validar Certificado</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 2C8 4.5 5 9 5 13.5 5 17.6 8.1 21 12 21s7-3.4 7-7.5C19 9 16 4.5 12 2z' fill='%231DAA4E'/%3E%3Cpath d='M12 4v15' stroke='%230B6E2A' stroke-width='1' stroke-linecap='round'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0B6E2A;
    --green-light:#3EC96A;
    --navy:#111827;
    --muted:#6b7280;
    --red:#b91c1c;
    --amber:#b45309;
    --bg:#f4f6f5;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:'Inter',Arial,Helvetica,sans-serif;
    background:var(--bg);
    color:var(--navy);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px;
  }
  .wrap{width:100%;max-width:760px}
  .top-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;color:var(--muted);font-size:13px}
  .top-bar b{color:var(--navy)}
  .state-box{
    background:#fff;border-radius:12px;padding:40px 24px;text-align:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .state-box .emoji{font-size:40px;margin-bottom:12px}
  .state-box h2{margin:0 0 6px;font-size:18px}
  .state-box p{margin:0;color:var(--muted);font-size:14px}
  .banner{
    display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:10px;
    font-weight:700;font-size:15px;margin-bottom:18px;
  }
  .banner.ok{background:rgba(11,110,42,.08);color:var(--green);border:1px solid rgba(11,110,42,.25)}
  .banner.warn{background:rgba(180,83,9,.08);color:var(--amber);border:1px solid rgba(180,83,9,.25)}
  /* Cartão-resumo do certificado validado (sem exibir o certificado em si —
     apenas os dados que confirmam a autenticidade + botão de download). */
  .cert-summary{
    background:#fff;border-radius:14px;box-shadow:0 4px 20px rgba(0,0,0,.12);
    padding:36px 32px;text-align:center;
  }
  .cert-summary .icon{font-size:40px;margin-bottom:10px}
  .cert-summary .eyebrow{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#4b5563;margin-bottom:8px}
  .cert-summary .nome{
    font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:800;color:#111827;
    text-transform:uppercase;margin-bottom:2px;word-break:break-word;
  }
  .cert-summary .cpf{font-size:11px;color:#9ca3af;letter-spacing:.04em;margin-bottom:16px}
  .cert-summary .rule{width:60%;max-width:340px;height:2px;background:linear-gradient(90deg,#0B6E2A,#3EC96A);margin:0 auto 18px;border-radius:2px}
  .cert-summary .info{font-size:14px;line-height:1.7;color:#1f2937;margin-bottom:22px}
  .cert-summary .info b{color:#111827}
  .cert-summary .code-row{margin-top:18px;font-size:11px;color:#9ca3af;letter-spacing:.05em}
  .cert-summary .code-row b{color:var(--green);font-family:monospace}

  /* Botão "Baixar Certificado" — mesmo estilo/tamanho do botão usado no
     painel do aluno (classes .btn / .btn-green de prototipo-plataforma-ead.html). */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
  .btn-green{background:#40916C;color:#fff}
  .btn-green:hover{background:#2D6A4F}
  .btn-green:disabled{opacity:.65;cursor:not-allowed}

  /* Fonte de renderização do certificado usada apenas para gerar o PDF —
     nunca é exibida ao visitante (fica fora da área visível da tela). */
  #cert-pdf-source{position:absolute;left:-99999px;top:0}

  footer{margin-top:20px;text-align:center;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">🔍 <span>Validação pública de certificado &middot; código <b id="codigo-label">—</b></span></div>
  <div id="app">
    <div class="state-box">
      <div class="emoji">⏳</div>
      <h2>Verificando…</h2>
      <p>Aguarde enquanto consultamos o certificado.</p>
    </div>
  </div>
  <footer>Se você não solicitou esta verificação, pode fechar esta página com segurança.</footer>
</div>

<!-- Fonte off-screen usada só para desenhar o certificado e gerar o PDF (o
     visitante nunca vê isso — ver #cert-pdf-source no CSS acima). -->
<div id="cert-pdf-source"></div>

<!-- html2pdf: gera o PDF do certificado direto no navegador, sem servidor
     (mesma lib usada no download do painel do aluno). -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script>
//---------------------------------------------------------------------
//
// QR Code Generator for JavaScript

var qrcode = function() {

  //---------------------------------------------------------------------
  // qrcode
  //---------------------------------------------------------------------

  /**
   * qrcode
   * @param typeNumber 1 to 40
   * @param errorCorrectionLevel 'L','M','Q','H'
   */
  var qrcode = function(typeNumber, errorCorrectionLevel) {

    var PAD0 = 0xEC;
    var PAD1 = 0x11;

    var _typeNumber = typeNumber;
    var _errorCorrectionLevel = QRErrorCorrectionLevel[errorCorrectionLevel];
    var _modules = null;
    var _moduleCount = 0;
    var _dataCache = null;
    var _dataList = [];

    var _this = {};

    var makeImpl = function(test, maskPattern) {

      _moduleCount = _typeNumber * 4 + 17;
      _modules = function(moduleCount) {
        var modules = new Array(moduleCount);
        for (var row = 0; row < moduleCount; row += 1) {
          modules[row] = new Array(moduleCount);
          for (var col = 0; col < moduleCount; col += 1) {
            modules[row][col] = null;
          }
        }
        return modules;
      }(_moduleCount);

      setupPositionProbePattern(0, 0);
      setupPositionProbePattern(_moduleCount - 7, 0);
      setupPositionProbePattern(0, _moduleCount - 7);
      setupPositionAdjustPattern();
      setupTimingPattern();
      setupTypeInfo(test, maskPattern);

      if (_typeNumber >= 7) {
        setupTypeNumber(test);
      }

      if (_dataCache == null) {
        _dataCache = createData(_typeNumber, _errorCorrectionLevel, _dataList);
      }

      mapData(_dataCache, maskPattern);
    };

    var setupPositionProbePattern = function(row, col) {

      for (var r = -1; r <= 7; r += 1) {

        if (row + r <= -1 || _moduleCount <= row + r) continue;

        for (var c = -1; c <= 7; c += 1) {

          if (col + c <= -1 || _moduleCount <= col + c) continue;

          if ( (0 <= r && r <= 6 && (c == 0 || c == 6) )
              || (0 <= c && c <= 6 && (r == 0 || r == 6) )
              || (2 <= r && r <= 4 && 2 <= c && c <= 4) ) {
            _modules[row + r][col + c] = true;
          } else {
            _modules[row + r][col + c] = false;
          }
        }
      }
    };

    var getBestMaskPattern = function() {

      var minLostPoint = 0;
      var pattern = 0;

      for (var i = 0; i < 8; i += 1) {

        makeImpl(true, i);

        var lostPoint = QRUtil.getLostPoint(_this);

        if (i == 0 || minLostPoint > lostPoint) {
          minLostPoint = lostPoint;
          pattern = i;
        }
      }

      return pattern;
    };

    var setupTimingPattern = function() {

      for (var r = 8; r < _moduleCount - 8; r += 1) {
        if (_modules[r][6] != null) {
          continue;
        }
        _modules[r][6] = (r % 2 == 0);
      }

      for (var c = 8; c < _moduleCount - 8; c += 1) {
        if (_modules[6][c] != null) {
          continue;
        }
        _modules[6][c] = (c % 2 == 0);
      }
    };

    var setupPositionAdjustPattern = function() {

      var pos = QRUtil.getPatternPosition(_typeNumber);

      for (var i = 0; i < pos.length; i += 1) {

        for (var j = 0; j < pos.length; j += 1) {

          var row = pos[i];
          var col = pos[j];

          if (_modules[row][col] != null) {
            continue;
          }

          for (var r = -2; r <= 2; r += 1) {

            for (var c = -2; c <= 2; c += 1) {

              if (r == -2 || r == 2 || c == -2 || c == 2
                  || (r == 0 && c == 0) ) {
                _modules[row + r][col + c] = true;
              } else {
                _modules[row + r][col + c] = false;
              }
            }
          }
        }
      }
    };

    var setupTypeNumber = function(test) {

      var bits = QRUtil.getBCHTypeNumber(_typeNumber);

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
      }

      for (var i = 0; i < 18; i += 1) {
        var mod = (!test && ( (bits >> i) & 1) == 1);
        _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
      }
    };

    var setupTypeInfo = function(test, maskPattern) {

      var data = (_errorCorrectionLevel << 3) | maskPattern;
      var bits = QRUtil.getBCHTypeInfo(data);

      // vertical
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 6) {
          _modules[i][8] = mod;
        } else if (i < 8) {
          _modules[i + 1][8] = mod;
        } else {
          _modules[_moduleCount - 15 + i][8] = mod;
        }
      }

      // horizontal
      for (var i = 0; i < 15; i += 1) {

        var mod = (!test && ( (bits >> i) & 1) == 1);

        if (i < 8) {
          _modules[8][_moduleCount - i - 1] = mod;
        } else if (i < 9) {
          _modules[8][15 - i - 1 + 1] = mod;
        } else {
          _modules[8][15 - i - 1] = mod;
        }
      }

      // fixed module
      _modules[_moduleCount - 8][8] = (!test);
    };

    var mapData = function(data, maskPattern) {

      var inc = -1;
      var row = _moduleCount - 1;
      var bitIndex = 7;
      var byteIndex = 0;
      var maskFunc = QRUtil.getMaskFunction(maskPattern);

      for (var col = _moduleCount - 1; col > 0; col -= 2) {

        if (col == 6) col -= 1;

        while (true) {

          for (var c = 0; c < 2; c += 1) {

            if (_modules[row][col - c] == null) {

              var dark = false;

              if (byteIndex < data.length) {
                dark = ( ( (data[byteIndex] >>> bitIndex) & 1) == 1);
              }

              var mask = maskFunc(row, col - c);

              if (mask) {
                dark = !dark;
              }

              _modules[row][col - c] = dark;
              bitIndex -= 1;

              if (bitIndex == -1) {
                byteIndex += 1;
                bitIndex = 7;
              }
            }
          }

          row += inc;

          if (row < 0 || _moduleCount <= row) {
            row -= inc;
            inc = -inc;
            break;
          }
        }
      }
    };

    var createBytes = function(buffer, rsBlocks) {

      var offset = 0;

      var maxDcCount = 0;
      var maxEcCount = 0;

      var dcdata = new Array(rsBlocks.length);
      var ecdata = new Array(rsBlocks.length);

      for (var r = 0; r < rsBlocks.length; r += 1) {

        var dcCount = rsBlocks[r].dataCount;
        var ecCount = rsBlocks[r].totalCount - dcCount;

        maxDcCount = Math.max(maxDcCount, dcCount);
        maxEcCount = Math.max(maxEcCount, ecCount);

        dcdata[r] = new Array(dcCount);

        for (var i = 0; i < dcdata[r].length; i += 1) {
          dcdata[r][i] = 0xff & buffer.getBuffer()[i + offset];
        }
        offset += dcCount;

        var rsPoly = QRUtil.getErrorCorrectPolynomial(ecCount);
        var rawPoly = qrPolynomial(dcdata[r], rsPoly.getLength() - 1);

        var modPoly = rawPoly.mod(rsPoly);
        ecdata[r] = new Array(rsPoly.getLength() - 1);
        for (var i = 0; i < ecdata[r].length; i += 1) {
          var modIndex = i + modPoly.getLength() - ecdata[r].length;
          ecdata[r][i] = (modIndex >= 0)? modPoly.getAt(modIndex) : 0;
        }
      }

      var totalCodeCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalCodeCount += rsBlocks[i].totalCount;
      }

      var data = new Array(totalCodeCount);
      var index = 0;

      for (var i = 0; i < maxDcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < dcdata[r].length) {
            data[index] = dcdata[r][i];
            index += 1;
          }
        }
      }

      for (var i = 0; i < maxEcCount; i += 1) {
        for (var r = 0; r < rsBlocks.length; r += 1) {
          if (i < ecdata[r].length) {
            data[index] = ecdata[r][i];
            index += 1;
          }
        }
      }

      return data;
    };

    var createData = function(typeNumber, errorCorrectionLevel, dataList) {

      var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, errorCorrectionLevel);

      var buffer = qrBitBuffer();

      for (var i = 0; i < dataList.length; i += 1) {
        var data = dataList[i];
        buffer.put(data.getMode(), 4);
        buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
        data.write(buffer);
      }

      // calc num max data.
      var totalDataCount = 0;
      for (var i = 0; i < rsBlocks.length; i += 1) {
        totalDataCount += rsBlocks[i].dataCount;
      }

      if (buffer.getLengthInBits() > totalDataCount * 8) {
        throw 'code length overflow. ('
          + buffer.getLengthInBits()
          + '>'
          + totalDataCount * 8
          + ')';
      }

      // end code
      if (buffer.getLengthInBits() + 4 <= totalDataCount * 8) {
        buffer.put(0, 4);
      }

      // padding
      while (buffer.getLengthInBits() % 8 != 0) {
        buffer.putBit(false);
      }

      // padding
      while (true) {

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD0, 8);

        if (buffer.getLengthInBits() >= totalDataCount * 8) {
          break;
        }
        buffer.put(PAD1, 8);
      }

      return createBytes(buffer, rsBlocks);
    };

    _this.addData = function(data, mode) {

      mode = mode || 'Byte';

      var newData = null;

      switch(mode) {
      case 'Numeric' :
        newData = qrNumber(data);
        break;
      case 'Alphanumeric' :
        newData = qrAlphaNum(data);
        break;
      case 'Byte' :
        newData = qr8BitByte(data);
        break;
      case 'Kanji' :
        newData = qrKanji(data);
        break;
      default :
        throw 'mode:' + mode;
      }

      _dataList.push(newData);
      _dataCache = null;
    };

    _this.isDark = function(row, col) {
      if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) {
        throw row + ',' + col;
      }
      return _modules[row][col];
    };

    _this.getModuleCount = function() {
      return _moduleCount;
    };

    _this.make = function() {
      if (_typeNumber < 1) {
        var typeNumber = 1;

        for (; typeNumber < 40; typeNumber++) {
          var rsBlocks = QRRSBlock.getRSBlocks(typeNumber, _errorCorrectionLevel);
          var buffer = qrBitBuffer();

          for (var i = 0; i < _dataList.length; i++) {
            var data = _dataList[i];
            buffer.put(data.getMode(), 4);
            buffer.put(data.getLength(), QRUtil.getLengthInBits(data.getMode(), typeNumber) );
            data.write(buffer);
          }

          var totalDataCount = 0;
          for (var i = 0; i < rsBlocks.length; i++) {
            totalDataCount += rsBlocks[i].dataCount;
          }

          if (buffer.getLengthInBits() <= totalDataCount * 8) {
            break;
          }
        }

        _typeNumber = typeNumber;
      }

      makeImpl(false, getBestMaskPattern() );
    };

    _this.createTableTag = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var qrHtml = '';

      qrHtml += '<table style="';
      qrHtml += ' border-width: 0px; border-style: none;';
      qrHtml += ' border-collapse: collapse;';
      qrHtml += ' padding: 0px; margin: ' + margin + 'px;';
      qrHtml += '">';
      qrHtml += '<tbody>';

      for (var r = 0; r < _this.getModuleCount(); r += 1) {

        qrHtml += '<tr>';

        for (var c = 0; c < _this.getModuleCount(); c += 1) {
          qrHtml += '<td style="';
          qrHtml += ' border-width: 0px; border-style: none;';
          qrHtml += ' border-collapse: collapse;';
          qrHtml += ' padding: 0px; margin: 0px;';
          qrHtml += ' width: ' + cellSize + 'px;';
          qrHtml += ' height: ' + cellSize + 'px;';
          qrHtml += ' background-color: ';
          qrHtml += _this.isDark(r, c)? '#000000' : '#ffffff';
          qrHtml += ';';
          qrHtml += '"/>';
        }

        qrHtml += '</tr>';
      }

      qrHtml += '</tbody>';
      qrHtml += '</table>';

      return qrHtml;
    };

    _this.createSvgTag = function(cellSize, margin, alt, title) {

      var opts = {};
      if (typeof arguments[0] == 'object') {
        // Called by options.
        opts = arguments[0];
        // overwrite cellSize and margin.
        cellSize = opts.cellSize;
        margin = opts.margin;
        alt = opts.alt;
        title = opts.title;
      }

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      // Compose alt property surrogate
      alt = (typeof alt === 'string') ? {text: alt} : alt || {};
      alt.text = alt.text || null;
      alt.id = (alt.text) ? alt.id || 'qrcode-description' : null;

      // Compose title property surrogate
      title = (typeof title === 'string') ? {text: title} : title || {};
      title.text = title.text || null;
      title.id = (title.text) ? title.id || 'qrcode-title' : null;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var c, mc, r, mr, qrSvg='', rect;

      rect = 'l' + cellSize + ',0 0,' + cellSize +
        ' -' + cellSize + ',0 0,-' + cellSize + 'z ';

      qrSvg += '<svg version="1.1" xmlns="http://www.w3.org/2000/svg"';
      qrSvg += !opts.scalable ? ' width="' + size + 'px" height="' + size + 'px"' : '';
      qrSvg += ' viewBox="0 0 ' + size + ' ' + size + '" ';
      qrSvg += ' preserveAspectRatio="xMinYMin meet"';
      qrSvg += (title.text || alt.text) ? ' role="img" aria-labelledby="' +
          escapeXml([title.id, alt.id].join(' ').trim() ) + '"' : '';
      qrSvg += '>';
      qrSvg += (title.text) ? '<title id="' + escapeXml(title.id) + '">' +
          escapeXml(title.text) + '</title>' : '';
      qrSvg += (alt.text) ? '<description id="' + escapeXml(alt.id) + '">' +
          escapeXml(alt.text) + '</description>' : '';
      qrSvg += '<rect width="100%" height="100%" fill="white" cx="0" cy="0"/>';
      qrSvg += '<path d="';

      for (r = 0; r < _this.getModuleCount(); r += 1) {
        mr = r * cellSize + margin;
        for (c = 0; c < _this.getModuleCount(); c += 1) {
          if (_this.isDark(r, c) ) {
            mc = c*cellSize+margin;
            qrSvg += 'M' + mc + ',' + mr + rect;
          }
        }
      }

      qrSvg += '" stroke="transparent" fill="black"/>';
      qrSvg += '</svg>';

      return qrSvg;
    };

    _this.createDataURL = function(cellSize, margin) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      return createDataURL(size, size, function(x, y) {
        if (min <= x && x < max && min <= y && y < max) {
          var c = Math.floor( (x - min) / cellSize);
          var r = Math.floor( (y - min) / cellSize);
          return _this.isDark(r, c)? 0 : 1;
        } else {
          return 1;
        }
      } );
    };

    _this.createImgTag = function(cellSize, margin, alt) {

      cellSize = cellSize || 2;
      margin = (typeof margin == 'undefined')? cellSize * 4 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;

      var img = '';
      img += '<img';
      img += '\u0020src="';
      img += _this.createDataURL(cellSize, margin);
      img += '"';
      img += '\u0020width="';
      img += size;
      img += '"';
      img += '\u0020height="';
      img += size;
      img += '"';
      if (alt) {
        img += '\u0020alt="';
        img += escapeXml(alt);
        img += '"';
      }
      img += '/>';

      return img;
    };

    var escapeXml = function(s) {
      var escaped = '';
      for (var i = 0; i < s.length; i += 1) {
        var c = s.charAt(i);
        switch(c) {
        case '<': escaped += '&lt;'; break;
        case '>': escaped += '&gt;'; break;
        case '&': escaped += '&amp;'; break;
        case '"': escaped += '&quot;'; break;
        default : escaped += c; break;
        }
      }
      return escaped;
    };

    var _createHalfASCII = function(margin) {
      var cellSize = 1;
      margin = (typeof margin == 'undefined')? cellSize * 2 : margin;

      var size = _this.getModuleCount() * cellSize + margin * 2;
      var min = margin;
      var max = size - margin;

      var y, x, r1, r2, p;

      var blocks = {
        '██': '█',
        '█ ': '▀',
        ' █': '▄',
        '  ': ' '
      };

      var blocksLastLineNoMargin = {
        '██': '▀',
        '█ ': '▀',
        ' █': ' ',
        '  ': ' '
      };

      var ascii = '';
      for (y = 0; y < size; y += 2) {
        r1 = Math.floor((y - min) / cellSize);
        r2 = Math.floor((y + 1 - min) / cellSize);
        for (x = 0; x < size; x += 1) {
          p = '█';

          if (min <= x && x < max && min <= y && y < max && _this.isDark(r1, Math.floor((x - min) / cellSize))) {

<script>
function escHtml(s) {

}
function formatarCPF(c) {

  return digits.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');

function minutosParaHoras(min) {
  if (!min && min !== 0) return '—';

  const m = min % 60;

}
function formatarDataBR(d) {
  if (!d) return null;
  return new Date(d).toLocaleDateString('pt-BR');

function pegarCodigoDaURL() {
  // Suporta tanto /validar/CODIGO (rota pública real) quanto
  // /validar.html?codigo=CODIGO (acesso direto ao arquivo estático).
  const params = new URLSearchParams(window.location.search);
  if (params.get('codigo')) return params.get('codigo');
  const partes = window.location.pathname.split('/').filter(Boolean);
  const ultima = partes[partes.length - 1] || '';
  return ultima.replace(/\.html$/i, '');
}

function renderEstado(emoji, titulo, texto) {
  document.getElementById('app').innerHTML = `
    <div class="state-box">
      <div class="emoji">${emoji}</div>
      <h2>${escHtml(titulo)}</h2>
      <p>${escHtml(texto)}</p>
    </div>`;
}

    : `<div class="banner warn">⚠️ Certificado expirado</div>`;

    ${banner}
    <div class="cert-summary">
      <div class="icon">🎓</div>
      <div class="eyebrow">Certificamos que</div>
      <div class="nome">${escHtml(data.funcionario_nome || '—')}</div>

  }

  // ── Ícone de folha (usado no cabeçalho e no selo) ──────────────────────
  const iconeFolha = `<svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C8 4.5 5 9 5 13.5 5 17.6 8.1 21 12 21s7-3.4 7-7.5C19 9 16 4.5 12 2z" fill="#1DAA4E"/>
    <path d="M12 4v15" stroke="#0B6E2A" stroke-width="1" stroke-linecap="round"/>
  </svg>`;

  // ── Vinheta lateral (haste com folhas alternadas, espelhável) ─────────
  // Gerada por loop em vez de desenhada folha a folha à mão: dá o efeito
  // de moldura floral do modelo sem exigir um SVG artístico complexo.
  function vinhetaLateral(mirror) {
    const alturaTotal = 560;
    const n = 12;
    let folhas = '';
    for (let i = 0; i < n; i++) {
      const y = 26 + i * ((alturaTotal - 70) / (n - 1));
      const lado = i % 2 === 0 ? 1 : -1;
      const rot = lado === 1 ? -30 : 30;
      const escala = 0.82 + (i % 3 === 0 ? 0.18 : 0);
      folhas += `<g transform="translate(46,${y.toFixed(1)}) rotate(${rot}) scale(${escala})">
        <path d="M0 0 C 13 -9 28 -7 40 0 C 28 7 13 9 0 0 Z" fill="#2D8A4E" opacity="0.88"/>
        <path d="M2 0 L38 0" stroke="#0B6E2A" stroke-width="0.7" opacity="0.55"/>
      </g>`;
    }
    return `<svg viewBox="0 0 92 ${alturaTotal}" width="58" height="${alturaTotal}" xmlns="http://www.w3.org/2000/svg" style="${mirror ? 'transform:scaleX(-1)' : ''}">
      <path d="M46 8 C 60 90 32 190 46 280 C 60 370 32 470 46 545" fill="none" stroke="#2D8A4E" stroke-width="2" opacity="0.75"/>
      <path d="M46 8 C 22 6 10 20 14 36 C 20 27 32 22 46 18" fill="none" stroke="#2D8A4E" stroke-width="1.3" opacity="0.7"/>
      ${folhas}
    </svg>`;
  }

  // ── Colunas de assinatura no rodapé (Resp. Técnico / Instrutor) ─
  function colunaAssinatura(rotulo, nomeSignatario, cargo, documento, imgBase64) {
    if (!nomeSignatario) return '<div style="flex:1"></div>';
    const img = imgBase64
      ? `<img src="${imgBase64}" alt="Assinatura" style="max-height:26px;display:block;margin:0 auto 2px;filter:brightness(0) invert(1);opacity:.9">` : '';
    return `<div style="flex:1;text-align:center;padding:0 10px;min-width:0">
      ${img}
      <div style="width:150px;max-width:88%;border-top:1px solid rgba(255,255,255,.55);margin:0 auto 5px"></div>
      <div style="font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:#eafff0;font-weight:700;margin-bottom:2px">${escHtml(rotulo)}</div>
      <div style="font-size:10.5px;font-weight:600;color:#ffffff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(nomeSignatario)}</div>
      ${cargo ? `<div style="font-size:8.5px;color:#d7f3e0">${escHtml(cargo)}</div>` : ''}
      ${documento ? `<div style="font-size:8px;color:#bfead0">${escHtml(documento)}</div>` : ''}
    </div>`;
  }

  const colInstrutor = colunaAssinatura(
    'Instrutor',
    (emissora && (emissora.assinatura_nome || emissora.instrutor_nome)) || '',
    emissora && (emissora.assinatura_cargo || 'Instrutor/Palestrante'),
    emissora && emissora.instrutor_documento,
    emissora && emissora.assinatura_base64
  );
  const colResponsavelTecnico = colunaAssinatura(
    'Responsável Técnico',
    (emissora && emissora.responsavel_tecnico_nome) || '',
    'Responsável Técnico',
    emissora && emissora.responsavel_tecnico_documento
  );

  const appUrl = window.location.origin;
  const urlValidacao = appUrl + '/validar/' + codigo_validacao;

  const brandNome = (emissora && emissora.empresa_razao_social) || 'Plataforma de Treinamentos';
  const brandCnpj = emissora && emissora.empresa_cnpj ? `CNPJ ${emissora.empresa_cnpj}` : '';

  // Imagens de fundo cadastradas no treinamento (frente = página 1, verso =
  // página 2). Quando presentes, o certificado usa a arte enviada pelo admin
  // como fundo e desenha só o conteúdo (nome, QR, assinaturas etc.) por
  // cima; quando ausentes, cai no desenho antigo (moldura/folhas em CSS/SVG).
  const fundoFrente = emissora && emissora.fundo_frente_base64;
  const fundoVerso = emissora && emissora.fundo_verso_base64;

  const conteudoCertificado = `
    <div style="font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:800;letter-spacing:13px;padding-left:13px;color:#111827;text-shadow:1px 1px 0 rgba(0,0,0,.1);margin-bottom:14px">CERTIFICADO</div>

    <div style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#4b5563;margin-bottom:10px">Certificamos que</div>

    <div style="font-family:Arial,Helvetica,sans-serif;font-size:27px;font-weight:800;color:#111827;letter-spacing:.01em;text-transform:uppercase;margin-bottom:2px">${escHtml(nome)}</div>
    <div style="font-size:10.5px;color:#9ca3af;letter-spacing:.04em;margin-bottom:10px">CPF ${formatarCPF(cpf)}</div>

    <div style="width:70%;max-width:460px;height:2px;background:linear-gradient(90deg,#0B6E2A,#3EC96A);margin-bottom:16px;border-radius:2px"></div>

    <div style="font-size:13.5px;line-height:1.65;color:#1f2937;text-align:left;max-width:560px">
      Participou do treinamento <strong>${escHtml(titulo).toUpperCase()}</strong>,
      ${data_inicio && data_fim ? `realizado entre <strong>${data_inicio}</strong>${data_fim !== data_inicio ? ` e <strong>${data_fim}</strong>` : ''}, ` : ''}
      com carga horária total de <strong>${minutosParaHoras(carga_horaria_min)}</strong>, concluído em <strong>${data_conclusao}</strong>.
      ${valido_ate ? `Certificado válido até <strong>${valido_ate}</strong>.` : ''}
    </div>

    <div style="margin-top:14px;display:flex;align-items:center;gap:8px">
      <div id="cert-qr-target" style="width:44px;height:44px;background:#fff;border:1px solid #e5e7eb;border-radius:4px;flex-shrink:0"></div>
      <div style="font-size:8.5px;color:#9ca3af;text-align:left;line-height:1.5">
        <div>Verifique em ${urlValidacao}</div>
        <div style="font-family:monospace;letter-spacing:.06em;color:#0B6E2A">Código ${codigo_validacao}</div>
      </div>
    </div>`;

  const paginaCertificado = fundoFrente ? `
<!-- PÁGINA 1 — CERTIFICADO (fundo enviado pelo admin) -->
<div style="width:842px;height:595px;position:relative;overflow:hidden;box-sizing:border-box">
  <img src="${fundoFrente}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0">
  <div style="position:absolute;inset:0;z-index:1;padding:108px 148px 0;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;text-align:center">
    ${conteudoCertificado}
  </div>
  <!-- faixa de assinaturas: sem cor própria — a imagem de fundo já traz a faixa -->
  <div style="position:absolute;left:0;right:0;bottom:0;height:92px;z-index:1;display:flex;align-items:center;padding:0 34px;box-sizing:border-box">
    ${colResponsavelTecnico}
    ${colInstrutor}
  </div>
</div>` : `
<!-- PÁGINA 1 — CERTIFICADO (moldura desenhada, sem imagem de fundo cadastrada) -->
<div style="width:842px;height:595px;background:#ffffff;position:relative;overflow:hidden;box-sizing:border-box">
  <!-- moldura dupla -->
  <div style="position:absolute;inset:12px;border:2.5px solid #14532D"></div>
  <div style="position:absolute;inset:18px;border:1px solid #14532D"></div>

  <!-- vinhetas laterais -->
  <div style="position:absolute;left:22px;top:16px">${vinhetaLateral(false)}</div>
  <div style="position:absolute;right:22px;top:16px">${vinhetaLateral(true)}</div>

  <!-- conteúdo -->
  <div style="position:absolute;inset:0;padding:34px 148px 0;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;text-align:center">
    <!-- marca da emissora -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      ${iconeFolha}
      <div style="text-align:left">
        <div style="font-family:'Fraunces',serif;font-size:16px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#14532D">${escHtml(brandNome)}</div>
        ${brandCnpj ? `<div style="font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:#8abf96">${escHtml(brandCnpj)}</div>` : ''}
      </div>
    </div>
    ${conteudoCertificado}
  </div>

  <!-- faixa de assinaturas -->
  <div style="position:absolute;left:0;right:0;bottom:0;height:92px;background:linear-gradient(90deg,#0B6E2A,#1DAA4E 55%,#3EC96A);display:flex;align-items:center;padding:0 34px;box-sizing:border-box">
    ${colResponsavelTecnico}
    ${colInstrutor}
  </div>

  <!-- selo -->
  <div style="position:absolute;right:30px;bottom:56px;width:72px;height:72px;border-radius:50%;background:#f4f6f5;border:2px dashed #c9d8cd;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)">
    ${iconeFolha}
  </div>
</div>`;

  // Página 2 — Conteúdo Programático (e/ou verso do certificado).
  // Só existe se houver conteúdo programático cadastrado OU uma imagem de
  // fundo do verso — se nenhum dos dois existir, o PDF fica só com 1 página
  // (isso é o que evita a página em branco extra no final).
  const itensPrograma = (conteudo_programatico || '')
    .split('\n')
    .map(l => l.trim())
    .filter(Boolean);

  const mostrarPagina2 = !!(conteudo_programatico || fundoVerso);

  // Escala dinâmica do conteúdo programático: com poucos itens usa 1 coluna
  // e fonte normal; listas longas encolhem a fonte e quebram em 2 colunas
  // pra caber inteiras na página, sem cortar no rodapé.
  const nItens = itensPrograma.length;
  let tituloFonte, tituloMargem, fontePrograma, gapPrograma, colunasPrograma;
  if (nItens <= 7) {
    tituloFonte = fundoVerso ? 24 : 26; tituloMargem = fundoVerso ? 28 : 34;
    fontePrograma = fundoVerso ? 13.5 : 14.5; gapPrograma = fundoVerso ? 14 : 16;
    colunasPrograma = 1;
  } else if (nItens <= 12) {
    tituloFonte = fundoVerso ? 21 : 23; tituloMargem = fundoVerso ? 18 : 22;
    fontePrograma = fundoVerso ? 12 : 13; gapPrograma = fundoVerso ? 9 : 10;
    colunasPrograma = 1;
  } else {
    tituloFonte = fundoVerso ? 19 : 21; tituloMargem = fundoVerso ? 14 : 18;
    fontePrograma = fundoVerso ? 10.5 : 11.5; gapPrograma = fundoVerso ? 7 : 8;
    colunasPrograma = 2;
  }
  const linhasPrograma = colunasPrograma === 2 ? Math.ceil(nItens / 2) : nItens;
  const listaEstilo = colunasPrograma === 2
    ? `display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(${linhasPrograma},auto);grid-auto-flow:column;column-gap:36px;row-gap:${gapPrograma}px;font-size:${fontePrograma}px;color:#1f2937;max-width:100%`
    : `display:flex;flex-direction:column;gap:${gapPrograma}px;font-size:${fontePrograma}px;color:#1f2937;max-width:640px`;

  const conteudoProgramatico = conteudo_programatico ? `
    <div style="font-size:${tituloFonte}px;font-weight:800;color:#111827;letter-spacing:.02em;text-align:center;margin-bottom:${tituloMargem}px">CONTEÚDO PROGRAMÁTICO</div>
    <div style="${listaEstilo}">
      ${itensPrograma.map(item => `<div>${escHtml(item)}${/[.;:]$/.test(item) ? '' : ';'}</div>`).join('')}
    </div>` : '';

  // Caixa de segurança do conteúdo programático: altura fixa que termina
  // ANTES da faixa/logo desenhado na parte de baixo da imagem de fundo do
  // verso (o fundo oficial traz um selo/faixa decorativa nos últimos ~160px
  // da página). O título+lista fica dentro de #cert-prog-inner e, após ser
  // inserido no DOM, ajustarConteudoProgramatico() reduz a escala do bloco
  // inteiro automaticamente se ele não couber na caixa — garantindo que o
  // texto sempre caiba por inteiro, sem tampar o logo, não importa quantos
  // itens o conteúdo programático tenha.
  const paginaConteudo = !mostrarPagina2 ? '' : (fundoVerso ? `
<!-- PÁGINA 2 — VERSO (fundo enviado pelo admin) -->
<div style="width:842px;height:595px;position:relative;overflow:hidden;font-family:'Inter',sans-serif;box-sizing:border-box">
  <img src="${fundoVerso}" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0">
  ${conteudoProgramatico ? `<div id="cert-prog-box" style="position:absolute;left:76px;right:76px;top:64px;height:365px;z-index:1;overflow:hidden">
    <div id="cert-prog-inner" style="transform-origin:top center">${conteudoProgramatico}</div>
  </div>` : ''}
</div>` : `
<!-- PÁGINA 2 — CONTEÚDO PROGRAMÁTICO (sem imagem de fundo cadastrada) -->
<div style="width:842px;height:595px;background:#ffffff;position:relative;overflow:hidden;font-family:'Inter',sans-serif;box-sizing:border-box">
  <div style="position:absolute;inset:16px;border:1.5px solid #111827"></div>
  <div id="cert-prog-box" style="position:absolute;left:76px;right:76px;top:40px;height:459px;box-sizing:border-box;overflow:hidden">
    <div id="cert-prog-inner" style="transform-origin:top center">${conteudoProgramatico}</div>
  </div>
  <div style="position:absolute;left:76px;right:76px;bottom:34px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:34px;height:34px;border-radius:8px;background:#eafbee;display:flex;align-items:center;justify-content:center">${iconeFolha}</div>
      <div style="font-size:9.5px;color:#374151;line-height:1.55">
        <div style="font-weight:700;color:#111827;font-size:10.5px">${escHtml(brandNome)}${brandCnpj ? ' · ' + escHtml(brandCnpj) : ''}</div>
        ${emissora && emissora.empresa_endereco ? `<div>${escHtml(emissora.empresa_endereco)}</div>` : ''}
        ${emissora && emissora.empresa_telefone ? `<div>${escHtml(emissora.empresa_telefone)}${emissora.empresa_email ? ' · ' + escHtml(emissora.empresa_email) : ''}</div>` : ''}
      </div>
    </div>
    <div style="text-align:right;font-size:8.5px;color:#9ca3af;line-height:1.6">
      <div>Carga horária: ${minutosParaHoras(carga_horaria_min)}${data_inicio && data_fim ? ` · Período: ${data_inicio}${data_fim !== data_inicio ? ` a ${data_fim}` : ''}` : ''}</div>
      <div>Conclusão: ${data_conclusao} · Código <span style="font-family:monospace;color:#0B6E2A">${codigo_validacao}</span></div>
    </div>
  </div>
</div>`);

  return `<div style="width:842px;font-family:'Inter',sans-serif">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
${paginaCertificado}
${paginaConteudo}
</div>`;
}

function ajustarConteudoProgramatico() {
  const box = document.getElementById('cert-prog-box');
  const inner = document.getElementById('cert-prog-inner');
  if (!box || !inner) return;
  inner.style.transform = 'scale(1)';
  const alturaCaixa = box.clientHeight;
  const alturaConteudo = inner.scrollHeight;
  if (alturaConteudo > alturaCaixa && alturaConteudo > 0) {
    const escala = Math.max(0.55, alturaCaixa / alturaConteudo);
    inner.style.transform = `scale(${escala})`;
  }
}

function _renderizarQrCertificado(urlValidacao) {
  const target = document.querySelector('#cert-qr-target');
  if (!target) return;
  target.innerHTML = '';
  if (typeof qrcode === 'undefined') {
    // Não deve mais acontecer (a lib está embutida no HTML), mas se algum
    // dia isto voltar a acontecer, ao menos avisa no console em vez de
    // falhar silenciosamente com um quadrado em branco.
    console.error('Biblioteca qrcode-generator não encontrada — QR code não pôde ser desenhado.');
    return;
  }
  try {
    const qr = qrcode(0, 'M'); // typeNumber 0 = automático, correctLevel M
    qr.addData(urlValidacao);
    qr.make();
    // createDataURL desenha o QR em um <canvas> interno da própria lib e
    // devolve um PNG em base64 — não depende de <svg> nem de timers.
    const dataUrl = qr.createDataURL(6, 4); // cellSize 6px, margin 4 módulos
    const img = document.createElement('img');
    img.alt = 'QR Code de validação';
    img.style.width = '44px';
    img.style.height = '44px';
    img.style.display = 'block';
    img.onerror = () => {
      // Fallback: se por algum motivo o PNG (canvas) falhar neste
      // navegador, tenta ao menos desenhar o SVG na pré-visualização.
      console.error('PNG do QR code falhou, tentando fallback em SVG.');
      target.innerHTML = qr.createSvgTag({ cellSize: 4, margin: 2 });
    };
    img.src = dataUrl;
    target.appendChild(img);
  } catch (e) {
    console.error('Erro ao gerar QR code do certificado:', e);
  }
}

async function baixarCertificadoValidar() {
  if (!_dadosCertAtual) return;
  const btn = document.getElementById('btn-baixar-cert');
  const textoOriginal = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = 'Gerando PDF…';

  // Desenha o certificado (mesmo layout do painel do aluno) dentro do
  // container off-screen #cert-pdf-source, só para capturar e gerar o PDF.
  const source = document.getElementById('cert-pdf-source');
  source.innerHTML = htmlCertificado(_dadosCertAtual);
  const wrapper = source.firstElementChild;

  const urlVal = _dadosCertAtual.url_validacao
    || (window.location.origin + '/validar/' + _dadosCertAtual.codigo_validacao);
  _renderizarQrCertificado(urlVal);
  ajustarConteudoProgramatico();
  await new Promise(r => requestAnimationFrame(r));
  if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch (_) {} }
  ajustarConteudoProgramatico();

  const paginas = Array.from(wrapper.children).filter(el => el.tagName === 'DIV');

  try {
    const opcoesComuns = {
      html2canvas: { scale: 2, useCORS: true },
      jsPDF: { unit: 'px', format: [842, 595], orientation: 'landscape' },
    };

    const pdf = await html2pdf()
      .set({ ...opcoesComuns, image: { type: 'jpeg', quality: 0.98 } })
      .from(paginas[0])
      .toPdf()
      .get('pdf');

    for (let i = 1; i < paginas.length; i++) {
      const canvas = await html2pdf()
        .set(opcoesComuns)
        .from(paginas[i])
        .toCanvas()
        .get('canvas');
      const imgData = canvas.toDataURL('image/jpeg', 0.98);
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, 842, 595);
    }

    pdf.save(`certificado-${_dadosCertAtual.codigo_validacao}.pdf`);
  } catch (e) {
    alert('Erro ao gerar o PDF: ' + e.message);
  } finally {
    source.innerHTML = '';
    btn.disabled = false;
    btn.innerHTML = textoOriginal;
  }
}

(async function main() {
  const codigo = (pegarCodigoDaURL() || '').toUpperCase();
  document.getElementById('codigo-label').textContent = codigo || '—';

  if (!codigo) {
    renderEstado('❌', 'Código não informado', 'Confira o link ou o código impresso no certificado.');
    return;
  }

  try {
    const res = await fetch('/api/validar/' + encodeURIComponent(codigo));
    const data = await res.json().catch(() => ({}));

    if (res.status === 404 || (!data.valido && !data.expirado)) {
      renderEstado('❌', 'Certificado não encontrado', 'Não existe nenhum certificado emitido com esse código.');
      return;
    }
    renderCertificado(data);
  } catch (e) {
    renderEstado('❌', 'Erro ao consultar', 'Não foi possível verificar o certificado agora. Tente novamente em instantes.');
  }
})();
</script>
